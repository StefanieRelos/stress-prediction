<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Stress Prediction — Check Your Stress</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="theme-color" content="#3b6ff0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="apple-touch-icon" href="/static/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface2: #f0f4ff;
      --border: #dde3f0;
      --accent: #3b6ff0;
      --accent2: #7c3aed;
      --text: #1e293b;
      --text2: #475569;
      --muted: #94a3b8;
      --shadow: 0 4px 24px rgba(59,111,240,0.08);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      padding: 24px 20px 80px;
      background-image:
        radial-gradient(ellipse at 10% 10%, rgba(59,111,240,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 90%, rgba(124,58,237,0.05) 0%, transparent 55%);
    }

    /* Top Nav */
    .top-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 660px;
      margin: 0 auto 28px;
      animation: fadeDown 0.5s ease both;
    }
    .back-btn {
      width: 38px; height: 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      color: var(--text2);
      font-size: 1rem;
      box-shadow: var(--shadow);
      transition: transform 0.15s;
    }
    .back-btn:hover { transform: translateX(-2px); }
    .nav-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    /* Progress */
    .progress-bar {
      max-width: 660px;
      margin: 0 auto 24px;
      animation: fadeUp 0.5s ease 0.1s both;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      width: 50%;
      transition: width 0.5s ease;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 660px;
      margin: 0 auto;
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s ease 0.15s both;
    }
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.8rem; font-weight: 600; color: var(--text2); }
    input, select {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      padding: 10px 13px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,111,240,0.12);
      background: #fff;
    }
    .divider { height: 1px; background: var(--border); margin: 22px 0; }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 10px;
      box-shadow: 0 4px 18px rgba(59,111,240,0.3);
    }
    button[type="submit"]:hover { opacity: 0.9; transform: translateY(-2px); }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 14px;
      color: #dc2626;
      font-size: 0.88rem;
      margin-top: 16px;
    }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 520px) {
      .grid-2 { grid-template-columns: 1fr; }
      .card { padding: 22px 16px; }
    }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <div class="top-nav">
    <a href="/" class="back-btn">←</a>
    <span class="nav-title">Check Your Stress Level</span>
  </div>

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-label">
      <span>Step 1 of 2 — Fill in your details</span>
      <span>50%</span>
    </div>
    <div class="progress-track"><div class="progress-fill"></div></div>
  </div>

  <!-- Form Card -->
  <div class="card">
    <form method="POST" action="/predict">

      <p class="section-label">👤 Personal Information</p>
      <div class="grid-2">
        <div class="field">
          <label for="age">Age</label>
          <input type="number" id="age" name="age" min="10" max="30" placeholder="e.g. 19" required/>
        </div>
        <div class="field">
          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="" disabled selected>Select gender</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>
      <p class="section-label">😴 Daily Habits</p>
      <div class="grid-2">
        <div class="field">
          <label for="sleep_hours">Sleep Hours / day</label>
          <input type="number" id="sleep_hours" name="sleep_hours" step="0.5" min="0" max="24" placeholder="e.g. 6" required/>
        </div>
        <div class="field">
          <label for="screen_time">Screen Time Hours / day</label>
          <input type="number" id="screen_time" name="screen_time" step="0.5" min="0" max="24" placeholder="e.g. 4" required/>
        </div>
        <div class="field">
          <label for="study_hours">Study Hours / day</label>
          <input type="number" id="study_hours" name="study_hours" step="0.5" min="0" max="24" placeholder="e.g. 3" required/>
        </div>
        <div class="field">
          <label for="caffeine_intake">Caffeine Intake (cups/day)</label>
          <input type="number" id="caffeine_intake" name="caffeine_intake" step="1" min="0" max="20" placeholder="e.g. 2" required/>
        </div>
      </div>

      <div class="divider"></div>
      <p class="section-label">🎓 Academic & Lifestyle</p>
      <div class="grid-2">
        <div class="field">
          <label for="physical_activity">Physical Activity Level</label>
          <select id="physical_activity" name="physical_activity" required>
            <option value="" disabled selected>Select level</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="field">
          <label for="academic_pressure">Academic Pressure Level</label>
          <select id="academic_pressure" name="academic_pressure" required>
            <option value="" disabled selected>Select level</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
      </div>

      <button type="submit">🔍 Predict My Stress Level →</button>
    </form>

    {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
    {% endif %}
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js");
    }
  </script>
</body>
</html>
